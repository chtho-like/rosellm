      - Range Buffer Mapping: range-based-parameter-buffer-mapping-interview-guide.md
      - Timers System: timers-system-deep-dive.md
      - ROPE: rope-position-embeddings-deep-dive.md
      - Shared Weight Reduction: shared-weight-gradient-reduction-deep-dive.md
      - Indexed Dataset: memory-mapped-indexed-dataset-deep-dive.md
      - Energy Monitoring: energy-monitoring-system-deep-dive.md
