name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/docs.yml"
      - ".pre-commit-config.yaml"
      - "Makefile"
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/check_docs_math.py"
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs.yml"
      - ".pre-commit-config.yaml"
      - "Makefile"
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/check_docs_math.py"

permissions:
  contents: read

concurrency:
  group: documentation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - name: Install documentation dependencies
        run: python -m pip install -r requirements-docs.txt
      - name: Validate source, generated HTML, and browser rendering
        run: make docs-render
      - name: Publish documentation site
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ROSELLM_PAGES_DEPLOY_KEY: ${{ secrets.ROSELLM_PAGES_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${ROSELLM_PAGES_DEPLOY_KEY:-}" ]]; then
            echo "ROSELLM_PAGES_DEPLOY_KEY is not configured" >&2
            exit 1
          fi

          key_file="${RUNNER_TEMP}/rosellm-pages-deploy-key"
          known_hosts_file="${RUNNER_TEMP}/rosellm-pages-known-hosts"
          install -m 600 /dev/null "${key_file}"
          printf '%s\n' "${ROSELLM_PAGES_DEPLOY_KEY}" > "${key_file}"
          ssh-keyscan -t ed25519 github.com > "${known_hosts_file}" 2>/dev/null

          touch site/.nojekyll
          git -C site init -b gh-pages
          git -C site config user.name "github-actions[bot]"
          git -C site config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git -C site add --all
          git -C site commit -m "Deploy ${GITHUB_SHA}"
          GIT_SSH_COMMAND="ssh -i ${key_file} -o IdentitiesOnly=yes \
            -o UserKnownHostsFile=${known_hosts_file} \
            -o StrictHostKeyChecking=yes" \
            git -C site push --force \
              git@github.com:WineChord/rosellm.git gh-pages
