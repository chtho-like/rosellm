name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pydantic transformers  # Required dependencies
        pip install -e ".[test]"  # Install with test extras
    
    - name: Run CPU tests
      run: |
        pytest tests/ -v --cov=rosellm --cov-report=term-missing

  cuda-test:
    runs-on: ubuntu-latest
    if: false  # Disabled until GPU runners are available
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch==2.6.0+cu118 --index-url https://download.pytorch.org/whl/cu118
        pip install pydantic transformers  # Required dependencies
        pip install -e ".[test]"  # Install with test extras
    
    - name: Run CUDA tests
      run: |
        pytest tests/ -v --cov=rosellm --cov-report=term-missing -m "gpu"
